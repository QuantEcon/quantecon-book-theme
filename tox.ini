# To use tox, see https://tox.readthedocs.io
# Simply pip or conda install tox
# If you use conda, you may also want to install tox-conda
# then run `tox` or `tox -- {pytest args}`
# To run in parallel using `tox -p` (this does not appear to work for this repo)

# To rebuild the tox environment, for example when dependencies change, use
# `tox -r`

# Note: if the following error is encountered: `ImportError while loading conftest`
# then then deleting compiled files has been found to fix it: `find . -name \*.pyc -delete`

[tox]
envlist = py{312,313}-sphinx7

[testenv]
usedevelop=true
passenv = TERM  # To make terminal coloring / other variables pass through

[testenv:py{312,313}-pre-commit]
extras = code_style
commands = pre-commit run {posargs}

[testenv:compile]
deps =
    sphinx-theme-builder[cli]
commands =
    stb compile

[testenv:docs-{update,clean}]
extras =
    doc
whitelist_externals = rm
commands =
    clean: rm -rf docs/_build
    sphinx-build -n --keep-going -b {posargs:html} docs/ docs/_build/{posargs:html}

[testenv:docs-live]
extras =
    doc
deps =
    sphinx-theme-builder[cli]
commands =
    stb serve docs --open-browser

[testenv:py{312,313}-sphinx{7,8}]
extras = test
deps =
    sphinx7: sphinx>=7,<8
    sphinx8: sphinx>=8,<9
commands = pytest {posargs}

[testenv:visual]
description = Run visual regression tests with Playwright (against fixtures repo)
passenv =
    TERM
    HOME
    CI
    PATH
    FIXTURES_REF
setenv =
    SNAPSHOT_DIR = macos
deps =
    jupyter-book==1.0.4post1
    sphinx-exercise
    sphinx-proof
    sphinxcontrib-youtube
    sphinx-togglebutton
    sphinxext-rediraffe
    sphinx-reredirects
allowlist_externals =
    npm
    npx
    git
    bash
commands =
    # Clone the fixtures repo if not present (default branch only — the
    # specific ref is applied in the next step so it works for SHAs too).
    bash -c "[ -d fixtures ] || git clone https://github.com/QuantEcon/quantecon-book-theme-fixtures fixtures"
    # Always fetch + checkout the requested ref (SHA, branch, or tag).
    # Applies on every run so changing FIXTURES_REF takes effect immediately.
    bash -c "cd fixtures && git fetch --quiet origin && git checkout --quiet \"$\{FIXTURES_REF:-main\}\""
    # Always rebuild the fixtures site. Sphinx is incremental, so this is
    # cheap on a no-op; the previous skip-if-built guard caused stale theme
    # assets to be served locally when the theme changed between runs.
    bash -c "cd fixtures && jb build ."
    # Install npm dependencies including Playwright
    npm ci
    npx playwright install chromium
    # Run visual tests
    npm run test:visual {posargs}

[testenv:visual-update]
description = Update visual regression test baselines (against fixtures repo)
passenv =
    TERM
    HOME
    PATH
    FIXTURES_REF
setenv =
    SNAPSHOT_DIR = macos
deps =
    jupyter-book==1.0.4post1
    sphinx-exercise
    sphinx-proof
    sphinxcontrib-youtube
    sphinx-togglebutton
    sphinxext-rediraffe
    sphinx-reredirects
allowlist_externals =
    npm
    npx
    git
    bash
commands =
    bash -c "[ -d fixtures ] || git clone https://github.com/QuantEcon/quantecon-book-theme-fixtures fixtures"
    bash -c "cd fixtures && git fetch --quiet origin && git checkout --quiet \"$\{FIXTURES_REF:-main\}\""
    bash -c "cd fixtures && jb build ."
    npm ci
    npx playwright install chromium
    npm run test:visual:update {posargs}
